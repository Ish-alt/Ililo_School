  <style>
    main{
      height: 90%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .dashboard-top{
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .welcome{
      color: var(--dark-color);
      padding: 2rem;
      width: 55%;
      font-size: 80px;
      font-weight: bold;
    }

    .progress-icon {
      fill: none;
      stroke: var(--dark-color);
      stroke-width: 90px;
      width: 100%;
    }

    .overview{
      display: flex;
      gap: .5rem;
      height: 80%;
    }

    .result{
      width: 25%;
      height: auto;
      padding: 2rem;
      border-radius: 2rem;
      background-color:var(--primary-color);
      box-shadow: 3px 3px 15px var(--shadow);
      color: var(--dark-color);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .avg{
      display: flex;
      justify-content: center;
      position: relative;
      color: var(--dark-color);
    }

    .avg svg{
      width: 100%;
      bottom: 3px;
    }

    .avg-text{
      position: absolute;
      top: 80%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 25px;
      font-weight: 600;
      text-align: center;
    }

    .sub-result{
      display: flex;
      flex-direction: column;
      align-content: center;
      background-color: var(--dark-color);
      color: var(--highlight-color);
      padding: 1rem;
      border-radius: 1.5rem;
      height: 60%;
      font-size: 15px;
      font-weight: 200;
    }

    .sub-elm{
      display: flex;
      justify-content: space-between;
      background-color: var(--midtone-color);
      padding: 1.5rem;
      border-radius: 1rem;
    }
    
    .left{
      width: 80%;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }

    .rp{
      display: flex;
      gap: .5rem;
      height: 50%;
      width: 100%;
    }

    .recent{
      width: 30%;
      background-color: var(--dark-color);
      box-shadow: 3px 3px 15px var(--shadow);
      border-radius: 2rem;
      padding: 2rem;
      color: var(--highlight-color);
    }

    .progress{
      width: 70%;
      background-color:var(--primary-color);
      box-shadow: 3px 3px 15px var(--shadow);
      border-radius: 2rem;
      padding: 2rem;
    }

    .strength{
      display: flex;  
      gap: .5rem;
      height: 50%;
    }

    .strong{
      width: 50%;
      background-color:var(--primary-color);
      box-shadow: 3px 3px 15px var(--shadow);
      border-radius: 2rem;
      padding: 2rem;
    }

    .weekness{
      width: 50%;
      background-color:var(--primary-color);
      box-shadow: 3px 3px 15px var(--shadow);
      border-radius: 2rem;
      padding: 2rem;
    }

    

  </style>
